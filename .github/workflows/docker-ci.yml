name: Docker CI/CD Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  IMAGE_NAME: hello-world-ci
  DOCKERHUB_USERNAME: tamcykul

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t $DOCKERHUB_USERNAME/$IMAGE_NAME:v1 .

      - name: Tag latest
        run: docker tag $DOCKERHUB_USERNAME/$IMAGE_NAME:v1 $DOCKERHUB_USERNAME/$IMAGE_NAME:latest

      - name: Push v1 image
        run: docker push $DOCKERHUB_USERNAME/$IMAGE_NAME:v1

      - name: Push latest image
        run: docker push $DOCKERHUB_USERNAME/$IMAGE_NAME:latest
